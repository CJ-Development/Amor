<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuestros Sueños ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0b14;
    --surface: #15111f;
    --surface2: #1e1830;
    --border: rgba(160,130,210,0.18);
    --border2: rgba(160,130,210,0.35);
    --purple: #9b72d4;
    --purple-light: #c4a0f0;
    --purple-dim: rgba(155,114,212,0.12);
    --lilac: #d4b8f0;
    --white: #f5f0ff;
    --muted: rgba(212,184,240,0.5);
    --done-bg: rgba(155,114,212,0.08);
    --radius: 14px;
    --radius-sm: 8px;
    --glow: 0 0 32px rgba(155,114,212,0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 420px; height: 420px; background: rgba(120,70,200,0.18); top: -80px; left: -100px; }
  .orb-2 { width: 300px; height: 300px; background: rgba(180,100,220,0.12); bottom: 10%; right: -80px; }
  .orb-3 { width: 200px; height: 200px; background: rgba(90,50,170,0.14); top: 55%; left: 30%; }

  /* Stars */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--lilac);
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; } 50% { opacity: var(--op, 0.6); }
  }

  /* Layout */
  .wrap { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 1.5rem 4rem; }

  /* Header */
  header {
    text-align: center;
    padding: 3.5rem 0 2rem;
  }
  .header-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--purple-light);
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.8;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.6rem, 7vw, 4rem);
    font-weight: 300;
    line-height: 1.1;
    color: var(--white);
    letter-spacing: -0.01em;
  }
  .header-title em {
    font-style: italic;
    color: var(--purple-light);
  }
  .header-subtitle {
    margin-top: 0.75rem;
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }
  .heart-divider {
    margin: 1.5rem auto 0;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    color: var(--border2);
  }
  .heart-divider span { font-size: 13px; color: var(--purple); animation: pulse-heart 2s ease-in-out infinite; }
  .heart-divider::before, .heart-divider::after {
    content: ''; flex: 1; max-width: 80px; height: 1px;
    background: linear-gradient(to right, transparent, var(--border2));
  }
  .heart-divider::after { background: linear-gradient(to left, transparent, var(--border2)); }
  @keyframes pulse-heart { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .progress-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .progress-track {
    flex: 1; height: 4px; background: rgba(155,114,212,0.15);
    border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--purple), var(--lilac));
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-count { font-size: 13px; font-weight: 500; color: var(--purple-light); white-space: nowrap; }

  /* Tabs */
  .tabs {
    display: flex; gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px;
    margin-bottom: 1.25rem;
  }
  .tab {
    flex: 1; padding: 0.5rem;
    font-size: 13px; font-family: 'Inter', sans-serif;
    background: transparent; border: none; cursor: pointer;
    border-radius: var(--radius-sm);
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--purple-dim);
    color: var(--purple-light);
    border: 1px solid var(--border2);
  }
  .tab:hover:not(.active) { color: var(--white); }

  /* Add form */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  .form-row { display: flex; gap: 0.75rem; }
  .add-form input[type="text"] {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.65rem 0.9rem;
    font-size: 14px; color: var(--white);
    font-family: 'Inter', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .add-form input[type="text"]::placeholder { color: var(--muted); }
  .add-form input[type="text"]:focus { border-color: var(--purple); }
  .emoji-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .emoji-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2); cursor: pointer;
    font-size: 16px; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .emoji-btn:hover, .emoji-btn.sel { background: var(--purple-dim); border-color: var(--purple); }
  .who-row { display: flex; gap: 8px; }
  .who-btn {
    padding: 0.4rem 0.9rem; border-radius: 999px;
    font-size: 12px; font-family: 'Inter', sans-serif;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .who-btn.sel { border-color: var(--purple); color: var(--purple-light); background: var(--purple-dim); }
  .add-btn {
    padding: 0.65rem 1.4rem;
    background: linear-gradient(135deg, #7340c4, #9b72d4);
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-size: 14px; font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.97); }

  /* Category label */
  .category-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--purple-light);
    letter-spacing: 0.04em;
    margin: 1.5rem 0 0.6rem;
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  /* List */
  .list { display: flex; flex-direction: column; gap: 8px; }

  /* Item card */
  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
    display: flex; align-items: center; gap: 0.9rem;
    transition: border-color 0.3s, background 0.3s, transform 0.2s, opacity 0.3s;
    animation: slide-in 0.3s cubic-bezier(0.22,1,0.36,1);
    cursor: default;
    position: relative; overflow: hidden;
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item:hover { border-color: var(--border2); }
  .item.done {
    background: var(--done-bg);
    border-color: rgba(155,114,212,0.25);
  }
  .item.done .item-text { text-decoration: line-through; color: var(--muted); }

  /* Completion shimmer */
  .item.completing::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(155,114,212,0.25), transparent);
    animation: shimmer 0.6s ease forwards;
  }
  @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

  .item-emoji { font-size: 1.3rem; flex-shrink: 0; width: 32px; text-align: center; }

  .item-body { flex: 1; min-width: 0; }
  .item-text { font-size: 15px; color: var(--white); transition: color 0.3s; line-height: 1.4; }
  .item-meta {
    font-size: 11px; color: var(--muted); margin-top: 3px;
    display: flex; gap: 10px; align-items: center;
  }
  .item-who {
    font-size: 10px; padding: 2px 8px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--purple-light);
  }

  /* Checkbox */
  .check-btn {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: transparent; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s; color: transparent; font-size: 13px;
    padding: 0;
  }
  .check-btn:hover { border-color: var(--purple); background: var(--purple-dim); }
  .item.done .check-btn {
    background: linear-gradient(135deg, #7340c4, #9b72d4);
    border-color: transparent; color: #fff;
  }

  /* Delete btn */
  .del-btn {
    width: 28px; height: 28px; border-radius: 6px;
    border: none; background: transparent; cursor: pointer;
    color: var(--muted); font-size: 16px; flex-shrink: 0;
    opacity: 0; transition: opacity 0.2s, color 0.2s;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: #c97e8a; }

  /* Hearts burst on complete */
  .burst {
    position: fixed; pointer-events: none; z-index: 9999;
    font-size: 1.4rem; animation: burst-up 1s ease forwards;
    will-change: transform, opacity;
  }
  @keyframes burst-up {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-90px) scale(0.4); opacity: 0; }
  }

  /* Empty state */
  .empty {
    text-align: center; padding: 3rem 1rem;
    color: var(--muted); font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-style: italic;
  }

  /* Filter row */
  .filter-row {
    display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 0.3rem 0.85rem; border-radius: 999px;
    font-size: 12px; font-family: 'Inter', sans-serif;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .filter-btn.active { border-color: var(--purple); color: var(--purple-light); background: var(--purple-dim); }

  @media (max-width: 500px) {
    .form-row { flex-direction: column; }
    .who-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="wrap">
  <header>
    <p class="header-eyebrow">Lista de pareja</p>
    <h1 class="header-title">Nuestros <em>Sueños</em></h1>
    <p class="header-subtitle">Todo lo que queremos vivir, sentir y crear juntos</p>
    <div class="heart-divider"><span>♥</span></div>
  </header>

  <div class="progress-wrap">
    <span class="progress-label">Logros</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-count" id="progressCount">0 de 0</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('todos')">✦ Todos</button>
    <button class="tab" onclick="setTab('pendientes')">○ Pendientes</button>
    <button class="tab" onclick="setTab('logrados')">✓ Logrados</button>
  </div>

  <div class="add-form">
    <div class="form-row">
      <input type="text" id="newText" placeholder="Agregar un sueño o plan…" maxlength="120" />
      <button class="add-btn" onclick="addItem()">+ Agregar</button>
    </div>
    <div class="emoji-row" id="emojiRow"></div>
    <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap;">
      <div class="who-row" id="whoRow"></div>
      <span style="font-size:12px;color:var(--muted);">categoría →</span>
      <div class="who-row" id="catRow"></div>
    </div>
  </div>

  <div class="filter-row" id="filterRow"></div>
  <div class="list" id="list"></div>
</div>

<script>
const EMOJIS = ['💜','✈️','🍽️','🎬','🏕️','🌊','🎊','📸','💌','🌙','🌸','☕','🎶','🏡','⭐'];
const WHO = ['Los dos','Ella propone','Él propone'];
const CATS = ['Viajes','Romance','Aventura','Hogar','Momentos','Sueños'];
const CAT_ICONS = {'Viajes':'✈️','Romance':'💜','Aventura':'🏕️','Hogar':'🏡','Momentos':'📸','Sueños':'⭐'};

let items = JSON.parse(localStorage.getItem('love-list-v2') || '[]');
let selEmoji = EMOJIS[0], selWho = WHO[0], selCat = CATS[5];
let currentTab = 'todos', currentFilter = 'Todas';

function save() { localStorage.setItem('love-list-v2', JSON.stringify(items)); }

// Stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;--op:${0.3+Math.random()*0.5}`;
  starsEl.appendChild(s);
}

// Build emoji row
const emojiRow = document.getElementById('emojiRow');
EMOJIS.forEach(e => {
  const b = document.createElement('button');
  b.className = 'emoji-btn' + (e===selEmoji?' sel':'');
  b.textContent = e;
  b.onclick = () => { selEmoji = e; document.querySelectorAll('.emoji-btn').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
  emojiRow.appendChild(b);
});

// Build who row
const whoRow = document.getElementById('whoRow');
WHO.forEach(w => {
  const b = document.createElement('button');
  b.className = 'who-btn' + (w===selWho?' sel':'');
  b.textContent = w;
  b.onclick = () => { selWho = w; document.querySelectorAll('.who-btn').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
  whoRow.appendChild(b);
});

// Build cat row
const catRow = document.getElementById('catRow');
CATS.forEach(c => {
  const b = document.createElement('button');
  b.className = 'who-btn' + (c===selCat?' sel':'');
  b.textContent = CAT_ICONS[c]+' '+c;
  b.onclick = () => { selCat = c; document.querySelectorAll('#catRow .who-btn').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
  catRow.appendChild(b);
});

// Filter row
function buildFilters() {
  const fr = document.getElementById('filterRow');
  fr.innerHTML = '';
  const filters = ['Todas', ...CATS];
  filters.forEach(f => {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (f===currentFilter?' active':'');
    b.textContent = (CAT_ICONS[f]||'') + ' ' + f;
    b.onclick = () => { currentFilter = f; render(); };
    fr.appendChild(b);
  });
}

function addItem() {
  const input = document.getElementById('newText');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  items.unshift({ id: Date.now(), text, emoji: selEmoji, who: selWho, cat: selCat, done: false, date: new Date().toLocaleDateString('es-CO',{day:'numeric',month:'short'}) });
  save(); input.value = ''; render();
}

document.getElementById('newText').addEventListener('keydown', e => { if (e.key==='Enter') addItem(); });

function toggleDone(id) {
  const idx = items.findIndex(i=>i.id===id);
  if (idx===-1) return;
  items[idx].done = !items[idx].done;
  save();
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el && items[idx].done) {
    el.classList.add('completing');
    const r = el.getBoundingClientRect();
    ['💜','✨','💫','🌸','⭐'].forEach((ch,i) => {
      const b = document.createElement('div');
      b.className = 'burst';
      b.textContent = ch;
      b.style.cssText = `left:${r.left+r.width/2+(i-2)*22}px;top:${r.top+r.height/2}px;animation-delay:${i*0.06}s`;
      document.body.appendChild(b);
      setTimeout(()=>b.remove(), 1100);
    });
    setTimeout(()=>el.classList.remove('completing'),700);
  }
  render();
}

function deleteItem(id) {
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) { el.style.opacity='0'; el.style.transform='translateX(20px)'; }
  setTimeout(()=>{ items = items.filter(i=>i.id!==id); save(); render(); }, 250);
}

function setTab(tab) { currentTab = tab; document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['todos','pendientes','logrados'][i]===tab)); render(); }

function render() {
  buildFilters();
  const done = items.filter(i=>i.done).length;
  const total = items.length;
  document.getElementById('progressFill').style.width = total ? (done/total*100)+'%' : '0%';
  document.getElementById('progressCount').textContent = `${done} de ${total}`;

  let filtered = items;
  if (currentFilter !== 'Todas') filtered = filtered.filter(i=>i.cat===currentFilter);
  if (currentTab === 'pendientes') filtered = filtered.filter(i=>!i.done);
  if (currentTab === 'logrados') filtered = filtered.filter(i=>i.done);

  const listEl = document.getElementById('list');
  if (!filtered.length) {
    listEl.innerHTML = `<div class="empty">${currentTab==='logrados'?'Aún no han logrado ninguno juntos…':'Aún no han agregado sueños aquí ✦'}</div>`;
    return;
  }

  // Group by category
  const groups = {};
  filtered.forEach(item => { if (!groups[item.cat]) groups[item.cat] = []; groups[item.cat].push(item); });

  listEl.innerHTML = '';
  Object.entries(groups).forEach(([cat, its]) => {
    if (Object.keys(groups).length > 1) {
      const label = document.createElement('div');
      label.className = 'category-label';
      label.innerHTML = `<span>${CAT_ICONS[cat]||'✦'}</span> ${cat}`;
      listEl.appendChild(label);
    }
    its.forEach(item => {
      const div = document.createElement('div');
      div.className = 'item' + (item.done?' done':'');
      div.dataset.id = item.id;
      div.innerHTML = `
        <button class="check-btn" onclick="toggleDone(${item.id})" aria-label="${item.done?'Marcar pendiente':'Marcar logrado'}">${item.done?'✓':''}</button>
        <span class="item-emoji">${item.emoji}</span>
        <div class="item-body">
          <div class="item-text">${escHtml(item.text)}</div>
          <div class="item-meta">
            <span class="item-who">${item.who}</span>
            <span>${item.date}</span>
          </div>
        </div>
        <button class="del-btn" onclick="deleteItem(${item.id})" aria-label="Eliminar">✕</button>`;
      listEl.appendChild(div);
    });
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Demo items
if (!items.length) {
  const demos = [
    { text:'Ver el amanecer desde una montaña', emoji:'🌙', who:'Los dos', cat:'Aventura' },
    { text:'Cocinar juntos una cena especial en casa', emoji:'🍽️', who:'Ella propone', cat:'Hogar' },
    { text:'Hacer un viaje sorpresa', emoji:'✈️', who:'Él propone', cat:'Viajes' },
    { text:'Escribirnos cartas de amor', emoji:'💌', who:'Los dos', cat:'Romance', done:true },
  ];
  demos.forEach((d,i) => items.push({ id: Date.now()+i, date:'hoy', done:false, ...d }));
  save();
}

render();
</script>
</body>
</html>
